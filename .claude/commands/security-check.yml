name: security-check
description: 배포 전 보안 취약점 체크리스트 생성 및 분석
hidden: false
args: []
prompt: |
  NestJS + Oracle/Tibero 백엔드 프로젝트의 배포 전 보안 체크를 진행해줘.

  다음 항목들을 체크해줘:

  1️⃣ SQL Injection 방지
     - Prepared Statement (Bind Variable) 사용 확인
     - 동적 SQL 생성 여부 확인
     - 모든 쿼리에서 :param 형식 사용 확인

  2️⃣ 환경 변수 관리
     - .env 파일이 .gitignore에 등록되어 있는지 확인
     - 민감한 정보 (DB 비번, API 키)가 코드에 하드코딩되어 있지 않은지 확인
     - .env.example이 있는지 확인

  3️⃣ 인증/인가
     - 공개 엔드포인트와 보호된 엔드포인트 분리
     - JWT 또는 인증 메커니즘이 구현되어 있는지 확인
     - 권한 검증 로직 확인

  4️⃣ 입력 검증
     - DTO를 통한 자동 검증 확인 (class-validator)
     - 비즈니스 로직 검증 확인
     - 특수문자 필터링 여부

  5️⃣ 에러 처리
     - 민감한 정보 노출 여부 확인
     - 일반적인 에러 메시지 사용 확인
     - 스택 트레이스 노출 여부

  6️⃣ CORS 설정
     - CORS가 적절히 설정되어 있는지 확인
     - 와일드카드 (*) 사용 여부

  7️⃣ 로깅
     - 민감한 정보 (비번, 토큰)가 로깅되고 있지 않은지 확인
     - 로그 파일 접근 권한 확인

  8️⃣ 의존성 보안
     - 취약한 패키지가 있는지 확인 (npm audit)
     - 의존성 버전이 최신인지 확인

  9️⃣ 데이터베이스 보안
     - Connection Pool 타임아웃 설정 확인
     - 데이터베이스 사용자 최소 권한 설정 확인
     - 암호화된 연결(TLS) 사용 확인

  🔟 배포 설정
     - NODE_ENV=production 설정 확인
     - 로깅 레벨이 INFO 이상으로 설정 확인
     - 디버그 모드 비활성화 확인

  출력 형식:
  - 각 항목별 체크 결과 (✅ 안전 / ⚠️ 경고 / ❌ 위험)
  - 발견된 이슈별 상세 설명
  - 개선 방안 제시
  - 우선순위 표시 (높음/중간/낮음)

  현재 프로젝트의 코드를 분석하고 체크리스트를 작성해줘.
