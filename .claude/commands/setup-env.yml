name: setup-env
description: 환경 변수 설정 가이드 및 예제 생성
hidden: false
args: []
prompt: |
  NestJS + Oracle/Tibero Starter Kit 프로젝트의 환경 변수 설정 가이드를 작성해줘.

  다음 내용을 포함해줘:

  1️⃣ 개발 환경 설정 (Development)
     - 필수 환경 변수 설정값
     - 기본값 제안
     - 로컬 테스트용 값

  2️⃣ 프로덕션 환경 설정 (Production)
     - 보안이 강화된 설정값
     - 로깅 레벨 설정
     - 성능 최적화 설정

  3️⃣ 데이터베이스 설정
     - Oracle/Tibero 연결 문자열 작성 방법
     - Connection Pool 최적 크기 계산
     - 네트워크 타임아웃 설정

  4️⃣ 로깅 설정
     - LOG_LEVEL 옵션 설명
     - 로그 파일 경로 설정
     - 프로덕션에서의 권장 설정

  5️⃣ 로컬 개발 환경 세팅 (단계별)
     1. .env.example 복사
     2. .env 파일 생성 및 수정
     3. Docker Compose로 Oracle XE 실행
     4. 데이터베이스 마이그레이션
     5. 애플리케이션 실행

  6️⃣ Docker 컨테이너 환경 설정
     - 환경 변수 주입 방법
     - docker-compose.yml 설정
     - 프로덕션 배포 시 주의사항

  7️⃣ CI/CD 파이프라인 설정
     - GitHub Actions 예제
     - 환경 변수 시크릿 설정
     - 배포 전 체크리스트

  8️⃣ 환경 변수 검증
     - 필수 환경 변수 확인 스크립트
     - 기본값 설정 로직
     - 타입 검증

  9️⃣ 보안 모범 사례
     - 민감한 정보 관리 (Git에 커밋하지 않기)
     - 환경 변수 암호화
     - 접근 권한 관리

  🔟 트러블슈팅
     - 환경 변수를 찾을 수 없을 때
     - 연결 실패 시 대처 방법
     - 성능 문제 해결

  출력 형식:
  - 마크다운 형식의 상세한 가이드
  - 실행 가능한 예제 커맨드
  - 체크리스트 포함
  - 각 섹션별 설명과 예제

  현재 프로젝트의 .env.example을 참고하여 상세한 설정 가이드를 작성해줘.
