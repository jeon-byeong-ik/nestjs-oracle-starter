name: test-api
description: 새로운 API 엔드포인트에 대한 Jest 테스트 파일 자동 생성
hidden: false
args:
  - name: apiName
    description: "API 이름 (예: product, order)"
    required: true
    hint: product
  - name: testType
    description: "테스트 타입 (service, controller, repository)"
    required: false
    hint: "service"
prompt: |
  NestJS API에 대한 Jest 테스트 파일을 생성해줘.

  API 이름: $1
  테스트 타입: $2 (기본값: service)

  다음을 포함한 완전한 테스트 파일을 생성해줘:

  1️⃣ Service 테스트 (test/$1.service.spec.ts)
     - Mock Repository 설정
     - create() 테스트
     - findAll() 테스트
     - findById() 테스트
     - delete() 테스트
     - 예외 처리 테스트 (NotFoundException 등)
     - 엣지 케이스 테스트

  2️⃣ Repository 테스트 (test/$1.repository.spec.ts)
     - Mock DatabaseService 설정
     - 데이터베이스 연결 관리 테스트
     - SQL 실행 및 결과 매핑 테스트
     - 에러 처리 테스트
     - 연결 종료 테스트

  3️⃣ Controller 테스트 (test/$1.controller.spec.ts)
     - Mock Service 설정
     - GET /api - 목록 조회 테스트
     - POST /api - 생성 테스트
     - GET /api/:id - 단일 조회 테스트
     - DELETE /api/:id - 삭제 테스트
     - DTO 검증 테스트
     - HTTP 상태 코드 테스트

  테스트 작성 시 준수사항:
  - Jest와 @nestjs/testing 사용
  - Mock 객체 활용
  - beforeEach에서 모듈 설정
  - afterEach에서 jest.clearAllMocks()
  - describe/it 블록으로 계층화
  - 각 테스트는 하나의 기능만 테스트
  - 테스트명은 "~해야 함" 형식 (should)
  - 예외 케이스도 포함
  - 주석은 한국어로 작성

  테스트 커버리지:
  - 정상 케이스 (Happy Path)
  - 예외 케이스
  - 엣지 케이스
  - 입력 검증
  - 데이터베이스 오류

  생성될 파일:
  - test/$1.service.spec.ts (또는 선택한 타입)

  주의사항:
  - 데이터베이스와 실제 연결하지 않기 (Mock 사용)
  - 테스트는 격리되어야 함
  - 외부 의존성은 모킹
  - 비동기 작업 처리 (async/await)
